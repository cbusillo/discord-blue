---
name: Deploy to Production
"on":
  workflow_dispatch:
  pull_request:
  push:
    branches:
      - main
permissions:
  contents: read
  id-token: write
  packages: write
jobs:
  validate:
    runs-on:
      - self-hosted
      - chris-testing
      - chris-testing-discord-blue
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Install uv
        run: |
          curl -LsSf https://astral.sh/uv/install.sh | sh
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"
        shell: bash
      - name: Install Python
        run: uv python install 3.13
      - name: Install dependencies
        run: uv sync --all-groups --python 3.13
      - name: Check formatting
        run: uv run ruff format --check .
      - name: Lint
        run: uv run ruff check .
      - name: Type check
        run: uv run mypy .
      - name: Test
        run: uv run python -m unittest discover -s tests -q

  image:
    needs: validate
    outputs:
      image_reference: ${{ steps.push.outputs.image_reference }}
    runs-on:
      - self-hosted
      - chris-testing
      - chris-testing-discord-blue
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Set image metadata
        id: image
        run: |
          image="ghcr.io/${GITHUB_REPOSITORY_OWNER,,}/discord-blue"
          {
            echo "image=$image"
            echo "tag_sha=$image:${GITHUB_SHA}"
            echo "tag_main=$image:main"
          } >> "$GITHUB_OUTPUT"
        shell: bash
      - name: Build container image
        run: docker build --tag ${{ steps.image.outputs.tag_sha }} .
      - name: Log in to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Push container image
        id: push
        if: github.event_name != 'pull_request'
        run: |
          set -euo pipefail
          docker push ${{ steps.image.outputs.tag_sha }}
          digest="$(docker inspect --format='{{index .RepoDigests 0}}' ${{ steps.image.outputs.tag_sha }})"
          echo "image_reference=$digest" >> "$GITHUB_OUTPUT"
          if [ "${GITHUB_REF}" = "refs/heads/main" ]; then
            docker tag ${{ steps.image.outputs.tag_sha }} ${{ steps.image.outputs.tag_main }}
            docker push ${{ steps.image.outputs.tag_main }}
          fi
        shell: bash

  launchplane-deploy:
    needs: image
    if: >-
      github.event_name == 'push' &&
      github.ref == 'refs/heads/main'
    runs-on:
      - self-hosted
      - chris-testing
      - chris-testing-discord-blue
    env:
      LAUNCHPLANE_URL: ${{ vars.LAUNCHPLANE_URL }}
      LAUNCHPLANE_AUDIENCE: ${{ vars.LAUNCHPLANE_AUDIENCE }}
    steps:
      - name: Request Launchplane deploy
        shell: bash
        run: |
          set -euo pipefail
          : "${LAUNCHPLANE_URL:?Missing LAUNCHPLANE_URL variable}"
          : "${{ needs.image.outputs.image_reference }}"

          audience="${LAUNCHPLANE_AUDIENCE:-}"
          if [ -z "$audience" ]; then
            audience="$({
              python3 - <<'PY'
          import os
          from urllib.parse import urlsplit

          parsed = urlsplit(os.environ["LAUNCHPLANE_URL"])
          if not parsed.hostname:
              raise SystemExit("Could not derive Launchplane audience from LAUNCHPLANE_URL.")
          print(parsed.hostname)
          PY
            })"
          fi

          oidc_token="$({
            curl -fsSL \
              -H "Authorization: bearer ${ACTIONS_ID_TOKEN_REQUEST_TOKEN}" \
              "${ACTIONS_ID_TOKEN_REQUEST_URL}&audience=${audience}" \
            | jq -r '.value'
          })"

          request_payload="$({
            jq -n \
              --arg image_reference "${{ needs.image.outputs.image_reference }}" \
              --arg source_git_ref "$GITHUB_SHA" \
              '{
                schema_version: 1,
                product: "discord-blue",
                deploy: {
                  schema_version: 1,
                  product: "discord-blue",
                  instance: "prod",
                  artifact_id: $image_reference,
                  source_git_ref: $source_git_ref
                }
              }'
          })"

          response_file="$(mktemp)"
          status_code="$(curl -sS \
            -o "$response_file" \
            -w '%{http_code}' \
            -X POST \
            -H "Authorization: Bearer ${oidc_token}" \
            -H 'Content-Type: application/json' \
            -H "Idempotency-Key: discord-blue-stable-deploy:${GITHUB_SHA}" \
            --data "$request_payload" \
            "${LAUNCHPLANE_URL%/}/v1/drivers/generic-web/deploy")"
          cat "$response_file"
          if [ "$status_code" != "200" ] && [ "$status_code" != "202" ]; then
            echo "Launchplane deploy request failed with HTTP ${status_code}." >&2
            exit 1
          fi

  deploy:
    needs: image
    if: >-
      github.event_name == 'push' &&
      github.ref == 'refs/heads/main' &&
      vars.DISCORD_BLUE_LEGACY_DEPLOY_ENABLED == 'true'
    runs-on:
      - self-hosted
      - chris-testing
      - chris-testing-discord-blue
    steps:
      - name: Setup Tailscale VPN
        uses: tailscale/github-action@v4
        with:
          oauth-client-id: ${{ secrets.TS_OAUTH_CLIENT_ID }}
          oauth-secret: ${{ secrets.TS_OAUTH_SECRET }}
          tags: tag:ci
      - name: Create SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_KEY }}" > ~/.ssh/id_ed25519
          chmod 700 ~/.ssh && chmod 600 ~/.ssh/id_ed25519
          ping -c 1 ${{ vars.PRODUCTION_SERVER }}
          ssh-keyscan -H ${{ vars.PRODUCTION_SERVER }} >> ~/.ssh/known_hosts
        shell: bash
      - name: Clone & Install
        run: |
          ssh \
            ${{ vars.PRODUCTION_USER }}@${{ vars.PRODUCTION_SERVER }} \
            <<'REMOTE'
          set -eu
          service_user=discord-blue
          service_home=/var/lib/discord-blue
          config_path=$service_home/.config/discord-blue/config.toml
          root_config=/root/.config/discord-blue/config.toml
          if ! getent group "$service_user" >/dev/null; then
            groupadd --system "$service_user"
          fi
          if ! id -u "$service_user" >/dev/null 2>&1; then
            useradd --system --home-dir "$service_home" --create-home \
              --gid "$service_user" --shell /usr/sbin/nologin \
              "$service_user"
          fi
          install -d -m 700 -o "$service_user" -g "$service_user" \
            "$service_home"
          install -d -m 700 -o "$service_user" -g "$service_user" \
            "$(dirname "$config_path")"
          if [ ! -f "$config_path" ] && [ -f "$root_config" ]; then
            install -D -m 600 -o "$service_user" -g "$service_user" \
              "$root_config" "$config_path"
          fi
          if [ ! -e "$service_home/.code" ] && [ -e /root/.code ]; then
            cp -a /root/.code "$service_home/.code"
            chown -R "$service_user:$service_user" "$service_home/.code"
          fi
          cd /opt/discord-blue
          export PYTHON_KEYRING_BACKEND=keyring.backends.null.Keyring
          export UV_PYTHON_INSTALL_DIR=/opt/discord-blue/.uv-python
          git pull
          install -d -m 755 .uv-python
          uv python install 3.13
          rm -rf .venv-next
          UV_PROJECT_ENVIRONMENT=/opt/discord-blue/.venv-next \
            uv sync --all-groups --python 3.13
          chmod -R a+rX .uv-python .venv-next
          rm -rf .venv-prev
          if [ -d .venv ]; then
            mv .venv .venv-prev
          fi
          mv .venv-next .venv
          old_shebang='^#!/opt/discord-blue/.venv-next/bin/python'
          new_shebang='#!/opt/discord-blue/.venv/bin/python'
          for script in $(grep -rl "$old_shebang" .venv/bin || true); do
            sed -i "1s|$old_shebang$|$new_shebang|" "$script"
          done
          cp discord-blue.service /etc/systemd/system/discord-blue.service
          systemctl daemon-reload
          systemctl enable discord-blue
          systemctl restart discord-blue
          rm -rf .venv-prev
          REMOTE
        shell: bash

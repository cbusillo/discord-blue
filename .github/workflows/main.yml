---
name: Deploy to Production
"on":
  workflow_dispatch:
  pull_request:
  push:
    branches:
      - main
permissions:
  contents: read
jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Install uv
        run: |
          curl -LsSf https://astral.sh/uv/install.sh | sh
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"
        shell: bash
      - name: Install Python
        run: uv python install 3.13
      - name: Install dependencies
        run: uv sync --all-groups --python 3.13
      - name: Check formatting
        run: uv run ruff format --check .
      - name: Lint
        run: uv run ruff check .
      - name: Type check
        run: uv run mypy .
      - name: Test
        run: uv run python -m unittest discover -s tests -q

  deploy:
    needs: validate
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - name: Setup Tailscale VPN
        uses: tailscale/github-action@v4
        with:
          oauth-client-id: ${{ secrets.TS_OAUTH_CLIENT_ID }}
          oauth-secret: ${{ secrets.TS_OAUTH_SECRET }}
          tags: tag:ci
      - name: Create SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_KEY }}" > ~/.ssh/id_ed25519
          chmod 700 ~/.ssh && chmod 600 ~/.ssh/id_ed25519
          ping -c 1 ${{ vars.PRODUCTION_SERVER }}
          ssh-keyscan -H ${{ vars.PRODUCTION_SERVER }} >> ~/.ssh/known_hosts
        shell: bash
      - name: Clone & Install
        run: |
          ssh \
            ${{ vars.PRODUCTION_USER }}@${{ vars.PRODUCTION_SERVER }} \
            "cd /opt/discord-blue; \
          export PYTHON_KEYRING_BACKEND=keyring.backends.null.Keyring; \
          git pull; \
          uv sync --all-groups; \
          systemctl restart discord-blue"
        shell: bash

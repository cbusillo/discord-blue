---
name: Deploy to Production
"on":
  workflow_dispatch:
  pull_request:
  push:
    branches:
      - main
permissions:
  contents: read
  id-token: write
  packages: write
jobs:
  validate:
    runs-on:
      - self-hosted
      - chris-testing
      - chris-testing-discord-blue
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Install uv
        run: |
          curl -LsSf https://astral.sh/uv/install.sh | sh
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"
        shell: bash
      - name: Install Python
        run: uv python install 3.13
      - name: Install dependencies
        run: uv sync --all-groups --python 3.13
      - name: Check formatting
        run: uv run ruff format --check .
      - name: Lint
        run: uv run ruff check .
      - name: Type check
        run: uv run mypy .
      - name: Test
        run: uv run python -m unittest discover -s tests -q

  image:
    needs: validate
    outputs:
      image_reference: ${{ steps.push.outputs.image_reference }}
    runs-on:
      - self-hosted
      - chris-testing
      - chris-testing-discord-blue
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Set image metadata
        id: image
        run: |
          image="ghcr.io/${GITHUB_REPOSITORY_OWNER,,}/discord-blue"
          {
            echo "image=$image"
            echo "tag_sha=$image:${GITHUB_SHA}"
            echo "tag_main=$image:main"
            echo "cache=$image:buildcache"
          } >> "$GITHUB_OUTPUT"
        shell: bash
      - name: Log in to GHCR
        if: github.ref == 'refs/heads/main'
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Set up Buildx
        uses: docker/setup-buildx-action@v4
      - name: Build container image
        uses: docker/build-push-action@v7
        with:
          context: .
          load: true
          tags: ${{ steps.image.outputs.tag_sha }}
          cache-from: type=registry,ref=${{ steps.image.outputs.cache }}
          cache-to: >-
            ${{ github.ref == 'refs/heads/main' &&
              format('type=registry,ref={0},mode=max', steps.image.outputs.cache) || '' }}
      - name: Push container image
        id: push
        if: github.ref == 'refs/heads/main'
        run: |
          set -euo pipefail
          docker push ${{ steps.image.outputs.tag_sha }}
          digest="$(docker inspect --format='{{index .RepoDigests 0}}' ${{ steps.image.outputs.tag_sha }})"
          echo "image_reference=$digest" >> "$GITHUB_OUTPUT"
          if [ "${GITHUB_REF}" = "refs/heads/main" ]; then
            docker tag ${{ steps.image.outputs.tag_sha }} ${{ steps.image.outputs.tag_main }}
            docker push ${{ steps.image.outputs.tag_main }}
          fi
        shell: bash

  launchplane-deploy:
    needs: image
    if: >-
      github.event_name == 'push' &&
      github.ref == 'refs/heads/main'
    runs-on:
      - self-hosted
      - chris-testing
      - chris-testing-discord-blue
    env:
      LAUNCHPLANE_URL: ${{ vars.LAUNCHPLANE_URL }}
      LAUNCHPLANE_AUDIENCE: ${{ vars.LAUNCHPLANE_AUDIENCE }}
    steps:
      - name: Request Launchplane deploy
        shell: bash
        run: |
          set -euo pipefail
          : "${LAUNCHPLANE_URL:?Missing LAUNCHPLANE_URL variable}"
          : "${{ needs.image.outputs.image_reference }}"

          audience="${LAUNCHPLANE_AUDIENCE:-}"
          if [ -z "$audience" ]; then
            audience="$({
              python3 - <<'PY'
          import os
          from urllib.parse import urlsplit

          parsed = urlsplit(os.environ["LAUNCHPLANE_URL"])
          if not parsed.hostname:
              raise SystemExit("Could not derive Launchplane audience from LAUNCHPLANE_URL.")
          print(parsed.hostname)
          PY
            })"
          fi

          oidc_token="$({
            curl -fsSL \
              -H "Authorization: bearer ${ACTIONS_ID_TOKEN_REQUEST_TOKEN}" \
              "${ACTIONS_ID_TOKEN_REQUEST_URL}&audience=${audience}" \
            | jq -r '.value'
          })"

          request_payload="$({
            jq -n \
              --arg image_reference "${{ needs.image.outputs.image_reference }}" \
              --arg source_git_ref "$GITHUB_SHA" \
              '{
                schema_version: 1,
                product: "discord-blue",
                deploy: {
                  schema_version: 1,
                  product: "discord-blue",
                  instance: "prod",
                  artifact_id: $image_reference,
                  source_git_ref: $source_git_ref
                }
              }'
          })"

          response_file="$(mktemp)"
          status_code="$(curl -sS \
            -o "$response_file" \
            -w '%{http_code}' \
            -X POST \
            -H "Authorization: Bearer ${oidc_token}" \
            -H 'Content-Type: application/json' \
            -H "Idempotency-Key: discord-blue-stable-deploy:${GITHUB_SHA}" \
            --data "$request_payload" \
            "${LAUNCHPLANE_URL%/}/v1/drivers/generic-web/deploy")"
          cat "$response_file"
          if [ "$status_code" != "200" ] && [ "$status_code" != "202" ]; then
            echo "Launchplane deploy request failed with HTTP ${status_code}." >&2
            exit 1
          fi
          deploy_status="$(jq -r '.result.deploy_status // empty' "$response_file")"
          if [ "$deploy_status" != "pass" ]; then
            error_message="$(jq -r '.result.error_message // "Launchplane deploy did not pass."' "$response_file")"
            echo "$error_message" >&2
            exit 1
          fi
